name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "10.0.x"
  REGISTRY: ghcr.io

jobs:
  dotnet-images:
    name: Publish .NET container (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            project: src/Api/Lanka.Api/Lanka.Api.csproj
          - name: gateway
            project: src/Api/Lanka.Gateway/Lanka.Gateway.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ matrix.project }} --os linux --arch x64

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Publish container image
        run: |
          dotnet publish ${{ matrix.project }} \
            --configuration Release \
            --no-restore \
            --os linux --arch x64 \
            /t:PublishContainer \
            -p ContainerRegistry=${{ env.REGISTRY }} \
            -p ContainerRepository=${{ github.repository_owner }}/lanka-${{ matrix.name }} \
            -p ContainerImageTags='"latest;${{ github.sha }}"'

  client-image:
    name: Publish Angular client container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: client/lanka-client
          file: client/lanka-client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/lanka-client:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/lanka-client:${{ github.sha }}

  notify-dokploy:
    name: Trigger Dokploy redeploy
    runs-on: ubuntu-latest
    needs: [dotnet-images, client-image]
    env:
      DOKPLOY_WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK }}
    steps:
      - name: POST Dokploy webhook
        run: |
          if [ -z "$DOKPLOY_WEBHOOK" ]; then
            echo "DOKPLOY_WEBHOOK secret is not configured; skipping redeploy trigger."
            exit 0
          fi
          curl --fail --silent --show-error --request POST \
            --max-time 30 \
            "$DOKPLOY_WEBHOOK"
