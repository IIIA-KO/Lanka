<p-dialog [(visible)]="visible" [modal]="true"
    [header]="'PUBLIC_PROFILE.PROPOSE.HEADER' | translate:{ name: offerName || ('PUBLIC_PROFILE.PROPOSE.NEW_CAMPAIGN' | translate) }"
    [style]="{ width: '90vw', maxWidth: '420px' }" (onHide)="onHide()">

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-column gap-3 pt-2">

        <p class="text-sm text-color-secondary m-0">
            {{ 'PUBLIC_PROFILE.PROPOSE.HINT' | translate }}
        </p>

        <div class="field">
            <label for="scheduledDate" class="block mb-2 font-medium">{{ 'PUBLIC_PROFILE.PROPOSE.DATE_LABEL' | translate }}</label>
            <p-datepicker id="scheduledDate" formControlName="scheduledDate" [minDate]="minDate" [showIcon]="true"
                appendTo="body" panelStyleClass="proposal-datepicker-panel"
                class="w-full" inputStyleClass="w-full"
                [placeholder]="'PUBLIC_PROFILE.PROPOSE.DATE_PLACEHOLDER' | translate" />
            @if (form.get('scheduledDate')?.touched && form.get('scheduledDate')?.invalid) {
                <small class="p-error block mt-1">
                    {{ 'PUBLIC_PROFILE.PROPOSE.DATE_REQUIRED' | translate }}
                </small>
            }
        </div>

        <div class="flex justify-content-end gap-2 mt-2">
            <p-button type="button" [label]="'PUBLIC_PROFILE.PROPOSE.CANCEL' | translate" class="p-button-text" (onClick)="onHide()"></p-button>
            <p-button type="submit" [label]="'PUBLIC_PROFILE.PROPOSE.SUBMIT' | translate" [loading]="loading" [disabled]="form.invalid"></p-button>
        </div>

    </form>
</p-dialog>
