server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* /assets/i18n/.*\.json$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
